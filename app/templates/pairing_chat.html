{% extends "base.html" %}
{% block title %}P2P Transfer · Chat{% endblock %}
{% block content %}
<div class="chat-container">
  <div class="chat-header">
    <div>
      <h2 id="peer-name">Connected Device</h2>
      <p class="muted" id="pairing-info">Pairing ID: <code id="pairing-id-display">-</code></p>
    </div>
    <button id="disconnect-btn" class="ghost" onclick="disconnectPairing()">Disconnect</button>
  </div>

  <div class="chat-messages" id="messages-container">
    <p class="muted" style="text-align: center; padding: 20px;">Waiting for messages...</p>
  </div>

  <div class="chat-input-area">
    <form id="message-form" onsubmit="sendMessage(event)">
      <div class="input-group">
        <textarea 
          id="message-input" 
          placeholder="Type a message (Shift+Enter to send)..." 
          rows="2"
        ></textarea>
        <button type="submit" class="btn-send">Send</button>
      </div>
    </form>
  </div>
</div>

<style>
.chat-container {
  display: flex;
  flex-direction: column;
  height: calc(100vh - 200px);
  max-width: 700px;
  margin: 0 auto;
  border: 1px solid #e0e0e0;
  border-radius: 8px;
  overflow: hidden;
  background: #fafafa;
}

.chat-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px;
  border-bottom: 1px solid #e0e0e0;
  background: #fff;
}

.chat-header h2 {
  margin: 0 0 5px 0;
  font-size: 1.2em;
}

.chat-header .muted {
  margin: 0;
  font-size: 0.9em;
}

.chat-header code {
  background: #f0f0f0;
  padding: 2px 6px;
  border-radius: 4px;
  font-size: 0.85em;
}

.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.message {
  display: flex;
  gap: 10px;
  animation: slideIn 0.3s ease-out;
}

@keyframes slideIn {
  from {
    opacity: 0;
    transform: translateY(10px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.message.sent {
  justify-content: flex-end;
}

.message.received {
  justify-content: flex-start;
}

.message-bubble {
  max-width: 70%;
  padding: 10px 14px;
  border-radius: 12px;
  word-wrap: break-word;
  box-shadow: 0 1px 2px rgba(0,0,0,0.1);
}

.message.sent .message-bubble {
  background: #007bff;
  color: white;
  border-radius: 12px 4px 12px 12px;
}

.message.received .message-bubble {
  background: #e0e0e0;
  color: #333;
  border-radius: 4px 12px 12px 12px;
}

.message-time {
  font-size: 0.75em;
  color: #999;
  align-self: flex-end;
  margin-top: 2px;
}

.chat-input-area {
  padding: 15px;
  border-top: 1px solid #e0e0e0;
  background: #fff;
}

.input-group {
  display: flex;
  gap: 10px;
}

#message-input {
  flex: 1;
  padding: 10px 12px;
  border: 1px solid #ddd;
  border-radius: 6px;
  font-family: inherit;
  font-size: 1em;
  resize: none;
}

#message-input:focus {
  outline: none;
  border-color: #007bff;
  box-shadow: 0 0 0 3px rgba(0, 123, 255, 0.1);
}

.btn-send {
  padding: 10px 20px;
  background: #007bff;
  color: white;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-size: 1em;
  font-weight: 500;
  transition: background 0.2s;
}

.btn-send:hover {
  background: #0056b3;
}

.error-message {
  background: #fee;
  color: #c33;
  padding: 15px;
  border-radius: 6px;
  margin: 20px;
  text-align: center;
}
</style>

{% endblock %}

{% block scripts %}
<script>
  let ws = null;
  let pairingId = null;
  let deviceId = null;
  let peerDevice = null;
  
  // Get pairing ID and device ID from URL or sessionStorage
  function initializeChat() {
    const params = new URLSearchParams(window.location.search);
    pairingId = params.get('pairing_id') || sessionStorage.getItem('pairing_id');
    deviceId = params.get('device_id') || sessionStorage.getItem('device_id');
    peerDevice = JSON.parse(sessionStorage.getItem('peer_device') || '{}');
    
    if (!pairingId || !deviceId) {
      showError('Missing pairing information. <a href="/">Go back to create a new pairing.</a>');
      return;
    }
    
    document.getElementById('pairing-id-display').textContent = pairingId.substring(0, 8) + '...';
    document.getElementById('peer-name').textContent = peerDevice.label || peerDevice.identifier || 'Connected Device';
    
    connectWebSocket();
  }
  
  function connectWebSocket() {
    const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
    const wsUrl = `${protocol}//${window.location.host}/ws/pairing/${encodeURIComponent(pairingId)}/${encodeURIComponent(deviceId)}`;
    
    ws = new WebSocket(wsUrl);
    
    ws.onopen = () => {
      console.log('WebSocket connected');
      addSystemMessage('Connected to peer device');
    };
    
    ws.onmessage = (event) => {
      const data = JSON.parse(event.data);
      handleMessage(data);
    };
    
    ws.onerror = (error) => {
      console.error('WebSocket error:', error);
      addSystemMessage('Connection error. Trying to reconnect...', 'error');
    };
    
    ws.onclose = () => {
      console.log('WebSocket closed');
      addSystemMessage('Disconnected from peer device', 'error');
      document.getElementById('message-input').disabled = true;
    };
  }
  
  function handleMessage(data) {
    const msgType = data.type;
    
    if (msgType === 'text') {
      addMessage(data.content, 'received', data.sender);
    } else if (msgType === 'error') {
      addSystemMessage(`Error: ${data.message}`, 'error');
    } else if (msgType === 'file_init') {
      addSystemMessage(`📁 Receiving file: ${data.file_name} (${formatSize(data.file_size)})`);
    } else if (msgType === 'file_end') {
      addSystemMessage(`✅ File received: ${data.file_name}`);
    }
  }
  
  function sendMessage(event) {
    event.preventDefault();
    const input = document.getElementById('message-input');
    const content = input.value.trim();
    
    if (!content) return;
    if (!ws || ws.readyState !== WebSocket.OPEN) {
      addSystemMessage('Not connected to peer', 'error');
      return;
    }
    
    const message = {
      type: 'text',
      content: content
    };
    
    ws.send(JSON.stringify(message));
    addMessage(content, 'sent');
    input.value = '';
    input.focus();
  }
  
  function addMessage(content, type = 'received', sender = null) {
    const container = document.getElementById('messages-container');
    
    // Remove "waiting for messages" placeholder on first message
    const placeholder = container.querySelector('.muted');
    if (placeholder) placeholder.remove();
    
    const messageDiv = document.createElement('div');
    messageDiv.className = `message ${type}`;
    
    const bubble = document.createElement('div');
    bubble.className = 'message-bubble';
    bubble.textContent = content;
    
    const time = document.createElement('div');
    time.className = 'message-time';
    time.textContent = new Date().toLocaleTimeString();
    
    messageDiv.appendChild(bubble);
    messageDiv.appendChild(time);
    container.appendChild(messageDiv);
    
    // Auto-scroll to bottom
    container.scrollTop = container.scrollHeight;
  }
  
  function addSystemMessage(content, type = 'info') {
    const container = document.getElementById('messages-container');
    const msgDiv = document.createElement('div');
    msgDiv.style.cssText = `
      text-align: center;
      color: #999;
      font-size: 0.9em;
      padding: 10px;
      font-style: italic;
    `;
    if (type === 'error') {
      msgDiv.style.color = '#d32f2f';
    }
    msgDiv.innerHTML = content;
    container.appendChild(msgDiv);
    container.scrollTop = container.scrollHeight;
  }
  
  function showError(message) {
    const container = document.querySelector('main.content');
    container.innerHTML = `<div class="error-message">${message}</div>`;
  }
  
  function disconnectPairing() {
    if (ws) {
      ws.close();
    }
    sessionStorage.removeItem('pairing_id');
    sessionStorage.removeItem('device_id');
    sessionStorage.removeItem('peer_device');
    window.location.href = '/';
  }
  
  function formatSize(bytes) {
    if (!bytes) return '0 B';
    const units = ['B', 'KB', 'MB', 'GB'];
    let size = bytes;
    let unitIdx = 0;
    while (size >= 1024 && unitIdx < units.length - 1) {
      size /= 1024;
      unitIdx++;
    }
    return size.toFixed(1) + ' ' + units[unitIdx];
  }
  
  // Initialize when page loads
  document.addEventListener('DOMContentLoaded', initializeChat);
  
  // Handle Shift+Enter to send message
  document.getElementById('message-input')?.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && e.shiftKey) {
      sendMessage(e);
    }
  });
</script>
{% endblock %}
