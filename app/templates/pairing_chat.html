{% extends "base.html" %}
{% block title %}P2P Transfer · Chat{% endblock %}
{% block content %}
<div class="chat-container">
  <div class="chat-header">
    <div>
      <h2 id="peer-name">Connected Device</h2>
      <p class="muted" id="pairing-info">Pairing ID: <code id="pairing-id-display">-</code></p>
    </div>
    <button id="disconnect-btn" class="ghost" onclick="disconnectPairing()">Disconnect</button>
  </div>

  <div class="chat-messages" id="messages-container">
    <p class="muted" style="text-align: center; padding: 20px;">✏️ Connecting to peer device...</p>
  </div>

  <div class="chat-input-area">
    <form id="message-form" onsubmit="sendMessage(event)">
      <div class="input-group">
        <div class="input-controls">
          <button type="button" class="btn-code" id="code-btn" onclick="toggleCodeMode()">💻 Code</button>
        </div>
        <textarea 
          id="message-input" 
          placeholder="Type a message or paste code..." 
          rows="2"
          disabled
        ></textarea>
        <button type="submit" class="btn-send" id="send-btn">Send</button>
      </div>
    </form>
    <div class="file-upload-area" id="file-upload-area">
      <input type="file" id="file-input" multiple style="display: none;" />
      <button type="button" class="btn-upload" onclick="document.getElementById('file-input').click()">📎 Attach Files</button>
      <span class="upload-hint">or drag & drop files here</span>
      <div id="file-preview" class="file-preview"></div>
    </div>
  </div>
</div>

<style>
.chat-container {
  display: flex;
  flex-direction: column;
  height: calc(100vh - 180px);
  max-width: 100%;
  margin: 0 auto;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  background: var(--item-bg);
  box-shadow: var(--shadow);
}

@media (min-width: 768px) {
  .chat-container {
    max-width: 800px;
  }
}

.chat-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px;
  border-bottom: 1px solid var(--border);
  background: var(--card);
}

.chat-header h2 {
  margin: 0 0 5px 0;
  font-size: 1.2em;
}

.chat-header .muted {
  margin: 0;
  font-size: 0.9em;
}

.chat-header code {
  background: var(--pre-bg);
  padding: 2px 6px;
  border-radius: 4px;
  font-size: 0.85em;
  color: var(--text);
  border: 1px solid var(--border);
}

.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.message {
  display: flex;
  gap: 10px;
  animation: slideIn 0.3s ease-out;
}

@keyframes slideIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.message.sent {
  justify-content: flex-end;
}

.message.received {
  justify-content: flex-start;
}

.message-bubble {
  max-width: 85%;
  padding: 10px 14px;
  border-radius: 12px;
  word-wrap: break-word;
  box-shadow: 0 1px 2px rgba(0,0,0,0.1);
  color: var(--text);
  overflow-x: auto;
}

@media (min-width: 768px) {
  .message-bubble {
    max-width: 70%;
  }
}

.message-bubble img,
.message-bubble video {
  max-width: 100%;
  border-radius: 8px;
  height: auto;
}

.message-bubble audio {
  max-width: 100%;
}

.message.sent .message-bubble {
  background: var(--msg-sent);
  color: var(--text-inverse);
  border-radius: 12px 4px 12px 12px;
}

.message.sent .download-btn {
  background: rgba(255,255,255,0.2) !important;
  color: #fff !important;
}

.message.sent .download-btn:hover {
  background: rgba(255,255,255,0.3) !important;
}

.message.received .message-bubble {
  background: var(--msg-received);
  color: var(--msg-received-text);
  border-radius: 4px 12px 12px 12px;
}

.code-message {
  font-family: 'Courier New', monospace;
  font-size: 0.9em;
  white-space: pre-wrap;
  word-wrap: break-word;
  background: var(--pre-bg) !important;
  border: 1px solid var(--border);
  padding: 12px 14px !important;
  color: var(--text);
}

.message.sent .code-message {
  background: rgba(0, 0, 0, 0.2) !important;
  border-color: rgba(255, 255, 255, 0.2);
  color: var(--text-inverse);
}

.code-message pre {
  margin: 0;
  white-space: pre-wrap;
}

.code-message code {
  background: none;
  padding: 0;
  color: inherit;
}

.message-time {
  font-size: 0.75em;
  color: var(--muted);
  align-self: flex-end;
  margin-top: 2px;
}

.chat-input-area {
  padding: 15px;
  border-top: 1px solid var(--border);
  background: var(--card);
}

.input-group {
  display: flex;
  gap: 10px;
  flex-direction: column;
}

.input-controls {
  display: flex;
  gap: 5px;
}

.btn-code {
  padding: 4px 8px;
  background: var(--muted);
  color: var(--text-inverse);
  border: none;
  border-radius: 4px;
  cursor: pointer;
  font-size: 0.8em;
  transition: opacity 0.2s;
}

.btn-code:hover {
  opacity: 0.8;
}

.btn-code.active {
  background: var(--accent);
}

#message-input {
  flex: 1;
  padding: 10px 12px;
  border: 1px solid var(--border);
  border-radius: 6px;
  font-family: inherit;
  font-size: 1em;
  resize: none;
  background: var(--input-bg);
  color: var(--text);
}

#message-input:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
}

#message-input:disabled {
  background: var(--item-bg);
  color: var(--muted);
  cursor: not-allowed;
  opacity: 0.7;
}

.btn-send {
  padding: 10px 20px;
  background: var(--accent);
  color: var(--text-inverse);
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-size: 1em;
  font-weight: 500;
  transition: opacity 0.2s;
}

.btn-send:hover:not(:disabled) {
  opacity: 0.8;
}

.btn-send:disabled {
  background: var(--muted);
  cursor: not-allowed;
  opacity: 0.5;
}

.btn-upload {
  padding: 8px 16px;
  background: #10b981;
  color: var(--text-inverse);
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-size: 0.9em;
  font-weight: 500;
  transition: opacity 0.2s;
  margin-top: 10px;
}

.btn-upload:hover {
  opacity: 0.8;
}

.file-upload-area {
  margin-top: 10px;
  padding: 10px;
  border: 2px dashed var(--border);
  border-radius: 6px;
  background: var(--item-bg);
  transition: border-color 0.2s, background-color 0.2s;
}

.file-upload-area.dragover {
  border-color: var(--accent);
  background: rgba(37, 99, 235, 0.05);
}

.upload-hint {
  font-size: 0.8em;
  color: var(--muted);
  margin-left: 10px;
}

.file-preview {
  margin-top: 10px;
}

.file-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px;
  background: var(--input-bg);
  border: 1px solid var(--border);
  border-radius: 4px;
  margin-bottom: 5px;
}

.file-item span {
  flex: 1;
  font-size: 0.9em;
  color: var(--text);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.file-item button {
  background: #ef4444;
  color: var(--text-inverse);
  border: none;
  border-radius: 4px;
  padding: 4px 8px;
  cursor: pointer;
  font-size: 0.8em;
  transition: opacity 0.2s;
}

.file-item button:hover {
  opacity: 0.8;
}

.error-message {
  background: rgba(239, 68, 68, 0.1);
  color: #ef4444;
  border: 1px solid rgba(239, 68, 68, 0.2);
  padding: 15px;
  border-radius: 6px;
  margin: 20px;
  text-align: center;
}
</style>

{% endblock %}

{% block scripts %}
<script>
  let ws = null;
  let pairingId = null;
  let deviceId = null;
  let peerDevice = null;
  let isCodeMode = false;
  
  function toggleCodeMode() {
    isCodeMode = !isCodeMode;
    const input = document.getElementById('message-input');
    const btn = document.getElementById('code-btn');
    
    if (isCodeMode) {
      btn.classList.add('active');
      input.placeholder = 'Paste your code here...';
      input.style.fontFamily = 'monospace';
      input.rows = 6;
    } else {
      btn.classList.remove('active');
      input.placeholder = 'Type a message or paste code...';
      input.style.fontFamily = '';
      input.rows = 2;
    }
    input.focus();
  }
  
  function initializeChat() {
    console.log('=== Chat Initialization Started ===');
    console.log('URL:', window.location.href);
    console.log('SessionStorage:', {
      pairing_id: sessionStorage.getItem('pairing_id'),
      device_id: sessionStorage.getItem('device_id'),
      peer_device: sessionStorage.getItem('peer_device')
    });
    
    // Get pairing info from URL or sessionStorage
    const params = new URLSearchParams(window.location.search);
    pairingId = params.get('pairing_id') || sessionStorage.getItem('pairing_id');
    deviceId = params.get('device_id') || sessionStorage.getItem('device_id');
    const peerDeviceStr = sessionStorage.getItem('peer_device');
    
    console.log('Extracted:', { pairingId, deviceId, peerDeviceStr });
    
    if (!pairingId || !deviceId) {
      console.error('Missing pairing or device ID');
      showError('❌ No pairing found. <a href="/">Click here to create one</a>.');
      return;
    }
    
    try {
      peerDevice = peerDeviceStr ? JSON.parse(peerDeviceStr) : {};
    } catch (e) {
      console.warn('Failed to parse peer device:', e);
      peerDevice = {};
    }
    
    console.log('Peer Device:', peerDevice);
    
    // Update UI
    document.getElementById('pairing-id-display').textContent = pairingId.substring(0, 8) + '...';
    document.getElementById('peer-name').textContent = peerDevice.label || peerDevice.identifier || 'Connected Device';
    
    connectWebSocket();
  }
  
  // File input handler
  document.getElementById('file-input').addEventListener('change', handleFileSelect);
  
  // Drag and drop handlers
  const uploadArea = document.getElementById('file-upload-area');
  uploadArea.addEventListener('dragover', (e) => {
    e.preventDefault();
    uploadArea.classList.add('dragover');
  });
  uploadArea.addEventListener('dragleave', () => {
    uploadArea.classList.remove('dragover');
  });
  uploadArea.addEventListener('drop', (e) => {
    e.preventDefault();
    uploadArea.classList.remove('dragover');
    const files = Array.from(e.dataTransfer.files);
    selectedFiles = [...selectedFiles, ...files];
    updateFilePreview();
  });
  
  function handleFileSelect(event) {
    const files = Array.from(event.target.files);
    selectedFiles = files;
    updateFilePreview();
  }
  
  function updateFilePreview() {
    const preview = document.getElementById('file-preview');
    preview.innerHTML = '';
    selectedFiles.forEach((file, index) => {
      const item = document.createElement('div');
      item.className = 'file-item';
      item.innerHTML = `
        <span>📄 ${file.name} (${formatFileSize(file.size)})</span>
        <button onclick="removeFile(${index})">Remove</button>
      `;
      preview.appendChild(item);
    });
  }
  
  function removeFile(index) {
    selectedFiles.splice(index, 1);
    updateFilePreview();
  }
  
  function formatFileSize(bytes) {
    if (bytes === 0) return '0 Bytes';
    const k = 1024;
    const sizes = ['Bytes', 'KB', 'MB', 'GB'];
    const i = Math.floor(Math.log(bytes) / Math.log(k));
    return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
  }
  
  async function uploadFile(file) {
    const formData = new FormData();
    formData.append('file', file);
    
    try {
      const response = await fetch(`/api/pairing/${encodeURIComponent(pairingId)}/files`, {
        method: 'POST',
        body: formData
      });
      
      if (!response.ok) {
        throw new Error(`Upload failed: ${response.status}`);
      }
      
      const result = await response.json();
      console.log('File uploaded:', result);
      
      // Send file shared message
      const message = {
        type: 'file_shared',
        filename: file.name,
        size: file.size
      };
      
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify(message));
        addFileMessage(file.name, file.size, 'sent');
      }
      
    } catch (error) {
      console.error('Upload error:', error);
      addSystemMessage('❌ Failed to upload file: ' + error.message, 'error');
    }
  }
  
  function addFileMessage(filename, size, type = 'received') {
    const container = document.getElementById('messages-container');
    
    // Remove placeholder
    const placeholder = container.querySelector('.muted');
    if (placeholder) placeholder.remove();
    
    const messageDiv = document.createElement('div');
    messageDiv.className = 'message ' + type;
    
    const bubble = document.createElement('div');
    bubble.className = 'message-bubble';
    
    const downloadUrl = `/api/pairing/${encodeURIComponent(pairingId)}/files/${encodeURIComponent(filename)}`;
    const fileExt = filename.split('.').pop().toLowerCase();
    let previewHtml = '';
    
    if (['jpg', 'jpeg', 'png', 'gif', 'webp'].includes(fileExt)) {
      previewHtml = `<a href="${downloadUrl}" target="_blank"><img src="${downloadUrl}" alt="${filename}" style="margin-bottom: 8px; border-radius: 8px;"></a><br>`;
    } else if (['mp4', 'webm', 'ogg'].includes(fileExt)) {
      previewHtml = `<video controls style="margin-bottom: 8px; border-radius: 8px;"><source src="${downloadUrl}" type="video/${fileExt}"></video><br>`;
    } else if (['mp3', 'wav', 'ogg'].includes(fileExt)) {
      previewHtml = `<audio controls style="margin-bottom: 8px;"><source src="${downloadUrl}" type="audio/${fileExt}"></audio><br>`;
    }
    
    bubble.innerHTML = `
      ${previewHtml}
      <div style="display: flex; align-items: center; justify-content: space-between; gap: 15px; margin-top: 5px;">
        <span style="overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 0.95em;">📄 <strong>${filename}</strong> <span style="opacity: 0.8; font-size: 0.9em;">(${formatFileSize(size)})</span></span>
        <a href="${downloadUrl}" download class="download-btn" style="color: var(--text-inverse); background: var(--accent); padding: 5px 12px; border-radius: 6px; text-decoration: none; font-size: 0.85em; font-weight: 500; white-space: nowrap; transition: background 0.2s;">Download</a>
      </div>
    `;
    
    const time = document.createElement('div');
    time.className = 'message-time';
    time.textContent = new Date().toLocaleTimeString();
    
    messageDiv.appendChild(bubble);
    messageDiv.appendChild(time);
    container.appendChild(messageDiv);
    
    setTimeout(() => {
      container.scrollTop = container.scrollHeight;
    }, 0);
  }
  
  function connectWebSocket() {
    const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
    const wsUrl = `${protocol}//${window.location.host}/ws/pairing/${encodeURIComponent(pairingId)}/${encodeURIComponent(deviceId)}`;
    
    console.log('🔌 Connecting to WebSocket:', wsUrl);
    console.log('📍 Device Info:', { pairingId, deviceId, peerDevice });
    addSystemMessage('⏳ Connecting to peer device...');
    
    try {
      ws = new WebSocket(wsUrl);
    } catch (error) {
      console.error('❌ WebSocket creation failed:', error);
      addSystemMessage('❌ Failed to create WebSocket', 'error');
      return;
    }
    
    ws.onopen = () => {
      console.log('✅ WebSocket connected!');
      console.log('🔄 Device:', deviceId, 'is now connected to pairing:', pairingId.substring(0, 8));
      addSystemMessage('✅ Connected to peer device - ready to chat!');
      document.getElementById('message-input').disabled = false;
      document.getElementById('message-input').focus();
      
      // Start keep-alive ping every 30 seconds
      ws.keepAliveInterval = setInterval(() => {
        if (ws && ws.readyState === WebSocket.OPEN) {
          console.log('💓 Sending keep-alive ping');
          ws.send(JSON.stringify({ type: 'ping' }));
        }
      }, 30000);
    };
    
    ws.onmessage = (event) => {
      console.log('📨 Message received:', event.data);
      try {
        const data = JSON.parse(event.data);
        handleMessage(data);
      } catch (e) {
        console.error('❌ Failed to parse message:', e);
        addSystemMessage('⚠️ Received invalid message format', 'error');
      }
    };
    
    ws.onerror = (error) => {
      console.error('❌ WebSocket error:', error);
      console.error('💥 Error details:', {
        type: error.type,
        message: error.message,
        readyState: ws?.readyState
      });
      addSystemMessage('❌ Connection error: ' + (error.message || 'Unknown error'), 'error');
      document.getElementById('message-input').disabled = true;
    };
    
    ws.onclose = () => {
      console.log('🔌 WebSocket closed. Ready state:', ws.readyState);
      if (ws.keepAliveInterval) {
        clearInterval(ws.keepAliveInterval);
      }
      addSystemMessage('⏹️ Disconnected from peer', 'error');
      document.getElementById('message-input').disabled = true;
    };
  }
  
  function handleMessage(data) {
    console.log('Handling message:', data);
    const msgType = data.type;
    
    if (msgType === 'text') {
      addMessage(data.content, 'received', data.isCode);
    } else if (msgType === 'error') {
      addSystemMessage('⚠️ ' + data.message, 'error');
    } else if (msgType === 'peer_connected') {
      addSystemMessage('✅ Peer device connected!', 'info');
    } else if (msgType === 'file_shared') {
      addFileMessage(data.filename, data.size, 'received');
    } else if (msgType === 'file_init') {
      addSystemMessage('📁 Receiving: ' + data.file_name, 'info');
    } else if (msgType === 'file_end') {
      addSystemMessage('✅ Received: ' + data.file_name, 'info');
    } else {
      console.warn('Unknown message type:', msgType);
    }
  }
  
  function sendMessage(event) {
    event.preventDefault();
    const input = document.getElementById('message-input');
    const content = input.value.trim();
    
    // Send text message if any
    if (content) {
      if (!ws || ws.readyState !== WebSocket.OPEN) {
        console.error('WebSocket not open. State:', ws?.readyState);
        addSystemMessage('❌ Not connected. Attempting to reconnect...', 'error');
        connectWebSocket();
        return;
      }
      
      console.log('Sending message:', content);
      const message = { type: 'text', content: content, isCode: isCodeMode };
      
      try {
        ws.send(JSON.stringify(message));
        addMessage(content, 'sent', isCodeMode);
        input.value = '';
        // Reset code mode after sending
        if (isCodeMode) {
          toggleCodeMode();
        }
      } catch (error) {
        console.error('Send error:', error);
        addSystemMessage('❌ Failed to send message', 'error');
      }
    }
    
    // Send files if any
    if (selectedFiles.length > 0) {
      selectedFiles.forEach(file => uploadFile(file));
      selectedFiles = [];
      updateFilePreview();
    }
    
    input.focus();
  }
  
  function addMessage(content, type = 'received', forceCode = false) {
    const container = document.getElementById('messages-container');
    
    // Remove placeholder
    const placeholder = container.querySelector('.muted');
    if (placeholder) placeholder.remove();
    
    const messageDiv = document.createElement('div');
    messageDiv.className = 'message ' + type;
    
    const bubble = document.createElement('div');
    bubble.className = 'message-bubble';
    
    // Check if content looks like code or is marked as code
    if (forceCode || isCodeContent(content)) {
      bubble.innerHTML = `<pre><code>${escapeHtml(content)}</code></pre>`;
      bubble.classList.add('code-message');
    } else {
      bubble.textContent = content;
    }
    
    const time = document.createElement('div');
    time.className = 'message-time';
    time.textContent = new Date().toLocaleTimeString();
    
    messageDiv.appendChild(bubble);
    messageDiv.appendChild(time);
    container.appendChild(messageDiv);
    
    setTimeout(() => {
      container.scrollTop = container.scrollHeight;
    }, 0);
  }
  
  function isCodeContent(content) {
    return content.includes('\n') || 
           content.includes('  ') || 
           /\b(function|class|def|const|let|var|import|if|for|while)\b/.test(content);
  }
  
  function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }
  
  function addSystemMessage(content, type = 'info') {
    const container = document.getElementById('messages-container');
    const msgDiv = document.createElement('div');
    msgDiv.style.cssText = `
      text-align: center;
      padding: 10px;
      font-size: 0.9em;
      font-style: italic;
      ${type === 'error' ? 'color: #d32f2f;' : 'color: #666;'}
    `;
    msgDiv.innerHTML = content;
    container.appendChild(msgDiv);
    container.scrollTop = container.scrollHeight;
  }
  
  function showError(message) {
    const main = document.querySelector('main.content');
    main.innerHTML = `<div class="error-message">${message}</div>`;
  }
  
  function disconnectPairing() {
    console.log('Disconnecting...');
    if (ws) ws.close();
    sessionStorage.clear();
    window.location.href = '/';
  }
  
  // Initialize on page load
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initializeChat);
  } else {
    initializeChat();
  }
  
  // Handle Shift+Enter to send
  document.addEventListener('keydown', (e) => {
    if (e.target.id === 'message-input' && e.key === 'Enter' && e.shiftKey) {
      e.preventDefault();
      sendMessage(e);
    }
  });
</script>
{% endblock %}
