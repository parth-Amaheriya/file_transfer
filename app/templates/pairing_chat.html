{% extends "base.html" %}
{% block title %}P2P Transfer · Chat{% endblock %}
{% block content %}
<div class="chat-container">
  <div class="chat-header">
    <div>
      <h2 id="peer-name">Connected Device</h2>
      <p class="muted" id="pairing-info">Pairing ID: <code id="pairing-id-display">-</code></p>
    </div>
    <button id="disconnect-btn" class="ghost" onclick="disconnectPairing()">Disconnect</button>
  </div>

  <div class="chat-messages" id="messages-container">
    <p class="muted" style="text-align: center; padding: 20px;">✏️ Connecting to peer device...</p>
  </div>

  <div class="chat-input-area">
    <form id="message-form" onsubmit="sendMessage(event)">
      <div class="input-group">
        <textarea 
          id="message-input" 
          placeholder="Type a message (Shift+Enter to send)..." 
          rows="2"
          disabled
        ></textarea>
        <button type="submit" class="btn-send" id="send-btn">Send</button>
      </div>
    </form>
  </div>
</div>

<style>
.chat-container {
  display: flex;
  flex-direction: column;
  height: calc(100vh - 200px);
  max-width: 700px;
  margin: 0 auto;
  border: 1px solid #e0e0e0;
  border-radius: 8px;
  overflow: hidden;
  background: #fafafa;
}

.chat-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px;
  border-bottom: 1px solid #e0e0e0;
  background: #fff;
}

.chat-header h2 {
  margin: 0 0 5px 0;
  font-size: 1.2em;
}

.chat-header .muted {
  margin: 0;
  font-size: 0.9em;
}

.chat-header code {
  background: #f0f0f0;
  padding: 2px 6px;
  border-radius: 4px;
  font-size: 0.85em;
}

.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.message {
  display: flex;
  gap: 10px;
  animation: slideIn 0.3s ease-out;
}

@keyframes slideIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.message.sent {
  justify-content: flex-end;
}

.message.received {
  justify-content: flex-start;
}

.message-bubble {
  max-width: 70%;
  padding: 10px 14px;
  border-radius: 12px;
  word-wrap: break-word;
  box-shadow: 0 1px 2px rgba(0,0,0,0.1);
}

.message.sent .message-bubble {
  background: #007bff;
  color: white;
  border-radius: 12px 4px 12px 12px;
}

.message.received .message-bubble {
  background: #e0e0e0;
  color: #333;
  border-radius: 4px 12px 12px 12px;
}

.message-time {
  font-size: 0.75em;
  color: #999;
  align-self: flex-end;
  margin-top: 2px;
}

.chat-input-area {
  padding: 15px;
  border-top: 1px solid #e0e0e0;
  background: #fff;
}

.input-group {
  display: flex;
  gap: 10px;
}

#message-input {
  flex: 1;
  padding: 10px 12px;
  border: 1px solid #ddd;
  border-radius: 6px;
  font-family: inherit;
  font-size: 1em;
  resize: none;
}

#message-input:focus {
  outline: none;
  border-color: #007bff;
  box-shadow: 0 0 0 3px rgba(0, 123, 255, 0.1);
}

#message-input:disabled {
  background: #f5f5f5;
  color: #999;
  cursor: not-allowed;
}

.btn-send {
  padding: 10px 20px;
  background: #007bff;
  color: white;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-size: 1em;
  font-weight: 500;
  transition: background 0.2s;
}

.btn-send:hover:not(:disabled) {
  background: #0056b3;
}

.btn-send:disabled {
  background: #ccc;
  cursor: not-allowed;
}

.error-message {
  background: #fee;
  color: #c33;
  padding: 15px;
  border-radius: 6px;
  margin: 20px;
  text-align: center;
}
</style>

{% endblock %}

{% block scripts %}
<script>
  let ws = null;
  let pairingId = null;
  let deviceId = null;
  let peerDevice = null;
  
  function initializeChat() {
    console.log('=== Chat Initialization Started ===');
    console.log('URL:', window.location.href);
    console.log('SessionStorage:', {
      pairing_id: sessionStorage.getItem('pairing_id'),
      device_id: sessionStorage.getItem('device_id'),
      peer_device: sessionStorage.getItem('peer_device')
    });
    
    // Get pairing info from URL or sessionStorage
    const params = new URLSearchParams(window.location.search);
    pairingId = params.get('pairing_id') || sessionStorage.getItem('pairing_id');
    deviceId = params.get('device_id') || sessionStorage.getItem('device_id');
    const peerDeviceStr = sessionStorage.getItem('peer_device');
    
    console.log('Extracted:', { pairingId, deviceId, peerDeviceStr });
    
    if (!pairingId || !deviceId) {
      console.error('Missing pairing or device ID');
      showError('❌ No pairing found. <a href="/">Click here to create one</a>.');
      return;
    }
    
    try {
      peerDevice = peerDeviceStr ? JSON.parse(peerDeviceStr) : {};
    } catch (e) {
      console.warn('Failed to parse peer device:', e);
      peerDevice = {};
    }
    
    console.log('Peer Device:', peerDevice);
    
    // Update UI
    document.getElementById('pairing-id-display').textContent = pairingId.substring(0, 8) + '...';
    document.getElementById('peer-name').textContent = peerDevice.label || peerDevice.identifier || 'Connected Device';
    
    connectWebSocket();
  }
  
  function connectWebSocket() {
    const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
    const wsUrl = `${protocol}//${window.location.host}/ws/pairing/${encodeURIComponent(pairingId)}/${encodeURIComponent(deviceId)}`;
    
    console.log('Connecting to WebSocket:', wsUrl);
    addSystemMessage('⏳ Connecting to peer device...');
    
    try {
      ws = new WebSocket(wsUrl);
    } catch (error) {
      console.error('WebSocket creation failed:', error);
      addSystemMessage('❌ Failed to create WebSocket', 'error');
      return;
    }
    
    ws.onopen = () => {
      console.log('✅ WebSocket connected!');
      addSystemMessage('✅ Connected to peer device - ready to chat!');
      document.getElementById('message-input').disabled = false;
      document.getElementById('message-input').focus();
    };
    
    ws.onmessage = (event) => {
      console.log('Message received:', event.data);
      try {
        const data = JSON.parse(event.data);
        handleMessage(data);
      } catch (e) {
        console.error('Failed to parse message:', e);
        addSystemMessage('⚠️ Received invalid message format', 'error');
      }
    };
    
    ws.onerror = (error) => {
      console.error('❌ WebSocket error:', error);
      addSystemMessage('❌ Connection error: ' + error.message, 'error');
      document.getElementById('message-input').disabled = true;
    };
    
    ws.onclose = () => {
      console.log('WebSocket closed');
      addSystemMessage('⏹️ Disconnected from peer', 'error');
      document.getElementById('message-input').disabled = true;
    };
  }
  
  function handleMessage(data) {
    console.log('Handling message:', data);
    const msgType = data.type;
    
    if (msgType === 'text') {
      addMessage(data.content, 'received');
    } else if (msgType === 'error') {
      addSystemMessage('⚠️ ' + data.message, 'error');
    } else if (msgType === 'file_init') {
      addSystemMessage('📁 Receiving: ' + data.file_name, 'info');
    } else if (msgType === 'file_end') {
      addSystemMessage('✅ Received: ' + data.file_name, 'info');
    } else {
      console.warn('Unknown message type:', msgType);
    }
  }
  
  function sendMessage(event) {
    event.preventDefault();
    const input = document.getElementById('message-input');
    const content = input.value.trim();
    
    if (!content) return;
    
    if (!ws || ws.readyState !== WebSocket.OPEN) {
      console.error('WebSocket not open. State:', ws?.readyState);
      addSystemMessage('❌ Not connected. Attempting to reconnect...', 'error');
      connectWebSocket();
      return;
    }
    
    console.log('Sending message:', content);
    const message = { type: 'text', content: content };
    
    try {
      ws.send(JSON.stringify(message));
      addMessage(content, 'sent');
      input.value = '';
      input.focus();
    } catch (error) {
      console.error('Send error:', error);
      addSystemMessage('❌ Failed to send message', 'error');
    }
  }
  
  function addMessage(content, type = 'received') {
    const container = document.getElementById('messages-container');
    
    // Remove placeholder
    const placeholder = container.querySelector('.muted');
    if (placeholder) placeholder.remove();
    
    const messageDiv = document.createElement('div');
    messageDiv.className = 'message ' + type;
    
    const bubble = document.createElement('div');
    bubble.className = 'message-bubble';
    bubble.textContent = content;
    
    const time = document.createElement('div');
    time.className = 'message-time';
    time.textContent = new Date().toLocaleTimeString();
    
    messageDiv.appendChild(bubble);
    messageDiv.appendChild(time);
    container.appendChild(messageDiv);
    
    setTimeout(() => {
      container.scrollTop = container.scrollHeight;
    }, 0);
  }
  
  function addSystemMessage(content, type = 'info') {
    const container = document.getElementById('messages-container');
    const msgDiv = document.createElement('div');
    msgDiv.style.cssText = `
      text-align: center;
      padding: 10px;
      font-size: 0.9em;
      font-style: italic;
      ${type === 'error' ? 'color: #d32f2f;' : 'color: #666;'}
    `;
    msgDiv.innerHTML = content;
    container.appendChild(msgDiv);
    container.scrollTop = container.scrollHeight;
  }
  
  function showError(message) {
    const main = document.querySelector('main.content');
    main.innerHTML = `<div class="error-message">${message}</div>`;
  }
  
  function disconnectPairing() {
    console.log('Disconnecting...');
    if (ws) ws.close();
    sessionStorage.clear();
    window.location.href = '/';
  }
  
  // Initialize on page load
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initializeChat);
  } else {
    initializeChat();
  }
  
  // Handle Shift+Enter to send
  document.addEventListener('keydown', (e) => {
    if (e.target.id === 'message-input' && e.key === 'Enter' && e.shiftKey) {
      e.preventDefault();
      sendMessage(e);
    }
  });
</script>
{% endblock %}
